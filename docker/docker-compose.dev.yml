# ──────────────────────────────────────────
# Studio 개발 환경 — dev override (Linux/Windows, NVIDIA GPU)
# base: docker-compose.yml
# 실행: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ──────────────────────────────────────────

services:
  # MySQL Database (개발용)
  mysql:
    image: mysql:8.0
    container_name: reeve-mysql
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ../sql/user_provided_ddl.sql:/docker-entrypoint-initdb.d/001_ddl.sql
      - ../sql/user_provided_dml.sql:/docker-entrypoint-initdb.d/002_dml.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reeve-network
    restart: no
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Studio Service (개발/관리용)
  studio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: reeve-studio
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../studio:/app/studio
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - MYSQL_HOST=mysql
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - reeve-network
    restart: no
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # 개발환경: 소스 바인드 마운트 (hot reload)
  identifier:
    volumes:
      - ../identifier:/app/identifier
      - ../logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: no

  celery-worker:
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: no
