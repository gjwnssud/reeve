# ──────────────────────────────────────────
# Studio 개발 환경 — dev override (Linux/Windows, NVIDIA GPU)
# base: docker-compose.yml
# 실행: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ──────────────────────────────────────────

services:
  # MySQL Database (개발용)
  mysql:
    image: mysql:8.0
    container_name: reeve-mysql
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ../sql/user_provided_ddl.sql:/docker-entrypoint-initdb.d/001_ddl.sql
      - ../sql/user_provided_dml.sql:/docker-entrypoint-initdb.d/002_dml.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reeve-network
    restart: no
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Studio Service (개발/관리용)
  studio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: reeve-studio
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../studio:/app/studio
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - MYSQL_HOST=mysql
      - OLLAMA_BASE_URL=http://ollama:11434
      - TRAINER_URL=http://trainer:8002
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - reeve-network
    restart: no
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M

  # 개발환경: 소스 바인드 마운트 (hot reload)
  identifier:
    volumes:
      - ../identifier:/app/identifier
      - ../logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: no

  celery-worker:
    volumes:
      - ../identifier:/app/identifier  # hot reload (identifier와 동일 코드베이스)
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: no

  trainer:
    volumes:
      - ../trainer:/app/trainer
      - ../data/finetune:/app/data/finetune
      - ../data/checkpoints/vlm:/app/output
    restart: no

  # ── Vite 개발 서버 (선택적, --profile vite 로 활성화) ──────────────────
  # 사용: docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile vite up -d
  # 또는 호스트에서 직접: pnpm dev:studio / pnpm dev:identifier
  vite-studio:
    image: node:20-alpine
    working_dir: /workspace/frontend/apps/studio
    command: sh -c "npm install -g pnpm@9.15.0 --quiet && pnpm install --frozen-lockfile && pnpm dev"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/workspace/frontend
    environment:
      - STUDIO_BACKEND_URL=http://studio:8000
    depends_on:
      - studio
    networks:
      - reeve-network
    restart: no
    profiles: ["vite"]

  vite-identifier:
    image: node:20-alpine
    working_dir: /workspace/frontend/apps/identifier
    command: sh -c "npm install -g pnpm@9.15.0 --quiet && pnpm install --frozen-lockfile && pnpm dev"
    ports:
      - "5174:5174"
    volumes:
      - ../frontend:/workspace/frontend
    environment:
      - IDENTIFIER_BACKEND_URL=http://identifier:8001
    depends_on:
      - identifier
    networks:
      - reeve-network
    restart: no
    profiles: ["vite"]
