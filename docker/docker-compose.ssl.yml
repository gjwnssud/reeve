# ──────────────────────────────────────────
# SSL overlay — self-signed 인증서 적용
# 실행: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.ssl.yml up -d
# 인증서 생성: ./gen-cert.sh <SERVER_IP>
# ──────────────────────────────────────────

services:
  studio:
    volumes:
      - ./certs:/certs:ro
    environment:
      - SSL_KEYFILE=/certs/key.pem
      - SSL_CERTFILE=/certs/cert.pem

  identifier:
    volumes:
      - ./certs:/certs:ro
    environment:
      - SSL_KEYFILE=/certs/key.pem
      - SSL_CERTFILE=/certs/cert.pem

  # 내부 서비스 URL을 https로 변경 (studio/identifier가 HTTPS로 전환되므로)
  trainer:
    environment:
      - STUDIO_URL=https://studio:8000
      - IDENTIFIER_URL=https://identifier:8001

  celery-worker:
    environment:
      - STUDIO_URL=https://studio:8000
      - IDENTIFIER_URL=https://identifier:8001
