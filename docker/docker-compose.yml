name: reeve

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: reeve-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis (Celery broker/backend)
  redis:
    image: redis:7.4-alpine
    container_name: reeve-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    networks:
      - reeve-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Identifier Vehicle Identification Service (FastAPI)
  identifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.identifier
    container_name: reeve-identifier
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ../logs:/app/logs
      - ../data/shared:/app/shared  # 비동기 작업용 공유 스토리지
      - ../data/efficientnet-models:/app/models/efficientnet  # Trainer와 공유하는 파인튜닝 모델
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://ollama:11434
      - TRAINER_URL=http://trainer:8002
      - IDENTIFIER_MODE=efficientnet
      - EFFICIENTNET_MODEL_PATH=/app/models/efficientnet/efficientnetv2_m_finetuned.pth
      - EFFICIENTNET_CLASS_MAPPING_PATH=/app/models/efficientnet/class_mapping.json
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Ollama (로컬 VLM - Qwen3-VL, NVIDIA GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: reeve-ollama
    ports:
      - "11434:11434"
    volumes:
      - ../data/ollama:/root/.ollama
    networks:
      - reeve-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # Ollama 모델 자동 pull (VLM_MODEL_NAME 없을 경우 qwen3-vl:8b)
  ollama-init:
    image: ollama/ollama:latest
    container_name: reeve-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama list | grep -q '${VLM_MODEL_NAME:-qwen3-vl:8b}' || ollama pull ${VLM_MODEL_NAME:-qwen3-vl:8b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - reeve-network
    restart: "no"

  # Trainer (파인튜닝 API 서비스 - LlamaFactory 또는 EfficientNet)
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trainer
    container_name: reeve-trainer
    ports:
      - "8002:8002"
    volumes:
      - ../data/finetune:/app/data/finetune  # Studio에서 export한 학습 데이터
      - ../output:/app/output                # 체크포인트 저장
      - ../data/hf-cache:/root/.cache/huggingface  # HuggingFace 모델 캐시
      - ../data/efficientnet-models:/app/models/efficientnet  # 파인튜닝 완료 모델 (Identifier와 공유)
    environment:
      - TRAINER_BACKEND=${TRAINER_BACKEND:-llamafactory}
      - OLLAMA_BASE_URL=http://ollama:11434
      - IDENTIFIER_URL=http://identifier:8001
      - STUDIO_URL=http://studio:8000
      - EFFICIENTNET_MODEL_DIR=/app/models/efficientnet
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 12G

  # Celery Worker (배치 처리)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.identifier
    container_name: reeve-celery-worker
    env_file:
      - .env
    command: /app/identifier/start_worker.sh
    volumes:
      - ../logs:/app/logs
      - ../data/shared:/app/shared
      - ../data/efficientnet-models:/app/models/efficientnet  # Identifier와 동일한 모델 공유
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://ollama:11434
      - TRAINER_URL=http://trainer:8002
      - IDENTIFIER_MODE=efficientnet
      - EFFICIENTNET_MODEL_PATH=/app/models/efficientnet/efficientnetv2_m_finetuned.pth
      - EFFICIENTNET_CLASS_MAPPING_PATH=/app/models/efficientnet/class_mapping.json
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

networks:
  reeve-network:
    driver: bridge
