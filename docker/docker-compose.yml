name: reeve

services:
  # Redis (Celery broker/backend)
  redis:
    image: redis:7.4-alpine
    container_name: reeve-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ../data/redis:/data
    networks:
      - reeve-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: ${REDIS_MEMORY_LIMIT:-512M}

  # Identifier Vehicle Identification Service (FastAPI)
  identifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.identifier
    container_name: reeve-identifier
    env_file:
      - .env
    ports:
      - "${IDENTIFIER_PORT:-8001}:8001"
    volumes:
      - ../logs:/app/logs
      - ../data/shared:/app/shared  # 비동기 작업용 공유 스토리지
      - ../data/models/efficientnet:/app/models/efficientnet  # Trainer와 공유하는 파인튜닝 모델
    environment:
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://ollama:11434
      - TRAINER_URL=http://trainer:8002
      - IDENTIFIER_MODE=efficientnet
      - EFFICIENTNET_MODEL_PATH=/app/models/efficientnet/efficientnetv2_m_finetuned.pth
      - EFFICIENTNET_CLASS_MAPPING_PATH=/app/models/efficientnet/class_mapping.json
    depends_on:
      redis:
        condition: service_started
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: ${IDENTIFIER_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '1.0'
          memory: 2G

  # Ollama (로컬 VLM - Qwen3-VL, NVIDIA GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: reeve-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
    volumes:
      - ../data/ollama:/root/.ollama
    networks:
      - reeve-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: ${OLLAMA_MEMORY_LIMIT:-8G}

  # Ollama 모델 자동 pull (VLM_MODEL_NAME 없을 경우 qwen3-vl:8b)
  ollama-init:
    image: ollama/ollama:latest
    container_name: reeve-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama list | grep -q '${VLM_MODEL_NAME:-qwen3-vl:8b}' || ollama pull ${VLM_MODEL_NAME:-qwen3-vl:8b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - reeve-network
    restart: "no"

  # Trainer (파인튜닝 API 서비스 - EfficientNet)
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trainer
    container_name: reeve-trainer
    env_file:
      - .env
    ports:
      - "${TRAINER_PORT:-8002}:8002"
    volumes:
      - ../data/finetune:/app/data/finetune  # Studio에서 export한 학습 데이터
      - ../data/uploads:/app/data/uploads    # Studio 업로드 이미지 (EfficientNet 학습용)
      - ../data/crops:/app/data/crops        # Studio 크롭 이미지 (EfficientNet 학습용)
      - ../data/checkpoints/vlm:/app/output             # VLM 학습 체크포인트
      - ../data/hf-cache:/root/.cache/huggingface        # HuggingFace 모델 캐시
      - ../data/models/vlm:/app/models/vlm               # VLM 병합 모델 (export 결과)
      - ../data/models/efficientnet:/app/models/efficientnet  # 파인튜닝 완료 모델 (Identifier와 공유)
    environment:
      - TRAINER_BACKEND=${TRAINER_BACKEND:-efficientnet}
      - OLLAMA_BASE_URL=http://ollama:11434
      - IDENTIFIER_URL=http://identifier:8001
      - STUDIO_URL=http://studio:8000
      - VLM_MODEL_DIR=/app/models/vlm
      - EFFICIENTNET_MODEL_DIR=/app/models/efficientnet
    shm_size: '8g'
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: ${TRAINER_MEMORY_LIMIT:-12G}

  # Celery Worker (배치 처리)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.identifier
    container_name: reeve-celery-worker
    env_file:
      - .env
    command: /app/identifier/start_worker.sh
    volumes:
      - ../logs:/app/logs
      - ../data/shared:/app/shared
      - ../data/models/efficientnet:/app/models/efficientnet  # Identifier와 동일한 모델 공유
    environment:
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://ollama:11434
      - TRAINER_URL=http://trainer:8002
      - IDENTIFIER_MODE=efficientnet
      - EFFICIENTNET_MODEL_PATH=/app/models/efficientnet/efficientnetv2_m_finetuned.pth
      - EFFICIENTNET_CLASS_MAPPING_PATH=/app/models/efficientnet/class_mapping.json
    depends_on:
      redis:
        condition: service_started
    networks:
      - reeve-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: ${CELERY_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '2.0'
          memory: 2G

networks:
  reeve-network:
    driver: bridge
