<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vehicle identification icon with magnifying glass and car -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad2)"/>

  <!-- Car icon -->
  <path d="M 25 45 L 30 35 L 45 35 L 50 45 Z" fill="#fff" opacity="0.9"/>
  <rect x="20" y="45" width="35" height="15" rx="2" fill="#fff" opacity="0.9"/>
  <circle cx="28" cy="62" r="4" fill="#fff" opacity="0.9"/>
  <circle cx="47" cy="62" r="4" fill="#fff" opacity="0.9"/>
  <rect x="30" y="40" width="6" height="6" fill="url(#grad2)"/>
  <rect x="38" y="40" width="6" height="6" fill="url(#grad2)"/>

  <!-- Magnifying glass -->
  <circle cx="60" cy="55" r="12" fill="none" stroke="#fff" stroke-width="4" opacity="0.9"/>
  <line x1="69" y1="64" x2="78" y2="73" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
</svg>
