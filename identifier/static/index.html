<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량 판별 서비스</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/reeve-theme.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-car-front"></i> Reeve Identifier
    </a>
    <button class="btn btn-sm btn-outline-light" id="themeToggle"><i class="bi bi-moon-stars"></i></button>
  </div>
</nav>

<div class="container py-4" style="max-width: 800px;">

    <!-- 업로드 섹션 -->
    <div class="card mb-4"><div class="card-body">
        <h5 class="card-title mb-3">📤 이미지 업로드</h5>
        <div id="uploadArea" class="upload-area bg-body-secondary">
            <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none;">
            <div class="upload-icon">📷</div>
            <div class="upload-title">이미지를 드래그하거나 클릭하여 선택</div>
            <div class="upload-desc">JPG, PNG, WebP 지원 · 최대 10MB</div>
        </div>
    </div></div>

    <!-- 이미지 카드 -->
    <div class="card mb-4"><div class="card-body">
        <h5 class="card-title mb-3">🖼️ 업로드된 이미지</h5>

        <div id="imageCard" class="card d-none">
            <!-- 이미지 컨테이너 -->
            <div id="imageContainer" class="image-container">
                <img id="previewImage" alt="업로드 이미지">
                <div id="bboxOverlayContainer"></div>
            </div>

            <!-- 이미지 정보 -->
            <div class="image-info p-3">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <h4 id="fileName">파일명</h4>
                    <span id="statusBadge" class="badge rounded-pill bg-info">준비</span>
                </div>

                <!-- 감지 목록 -->
                <div id="detectionList" class="list-group list-group-flush my-2"></div>

                <!-- 결과 영역 -->
                <div id="resultSection" class="card bg-body-secondary p-3 mt-3 d-none">
                    <div class="d-flex justify-content-between py-1 small">
                        <span class="result-label">제조사:</span>
                        <span id="resultManufacturer" class="result-value">-</span>
                    </div>
                    <div class="d-flex justify-content-between py-1 small">
                        <span class="result-label">모델:</span>
                        <span id="resultModel" class="result-value">-</span>
                    </div>
                    <div class="d-flex justify-content-between py-1 small">
                        <span class="result-label">식별 신뢰도:</span>
                        <span id="resultConfidence" class="result-value">-</span>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="d-flex gap-2 mt-3">
                    <button id="identifyBtn" class="btn btn-primary" disabled>판별하기</button>
                    <button id="deleteBtn" class="btn btn-danger">삭제</button>
                </div>
            </div>
        </div>

        <!-- 로딩 -->
        <div class="text-center p-4 d-none" id="loadingSpinner">
            <div class="spinner-border text-primary"></div>
            <div id="loadingText" class="mt-2">처리 중...</div>
        </div>

        <!-- 빈 상태 -->
        <div id="emptyState" class="text-center text-muted py-5">
            이미지를 업로드하세요
        </div>
    </div></div>

</div>

<footer class="text-center text-muted py-4 small">
    Reeve Vehicle Identification Service
</footer>

<script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/theme-toggle.js"></script>
<script>
    // ──────────────────────────────────────
    // State
    // ──────────────────────────────────────
    let selectedFile = null;
    let detections = [];
    let selectedIndex = null;
    let imageWidth = 0;
    let imageHeight = 0;
    let currentBbox = null;

    // ──────────────────────────────────────
    // DOM
    // ──────────────────────────────────────
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const imageCard = document.getElementById('imageCard');
    const imageContainer = document.getElementById('imageContainer');
    const previewImage = document.getElementById('previewImage');
    const bboxOverlayContainer = document.getElementById('bboxOverlayContainer');
    const fileName = document.getElementById('fileName');
    const statusBadge = document.getElementById('statusBadge');
    const detectionList = document.getElementById('detectionList');
    const resultSection = document.getElementById('resultSection');
    const resultManufacturer = document.getElementById('resultManufacturer');
    const resultModel = document.getElementById('resultModel');
    const resultConfidence = document.getElementById('resultConfidence');
    const identifyBtn = document.getElementById('identifyBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const loadingText = document.getElementById('loadingText');
    const emptyState = document.getElementById('emptyState');

    // ──────────────────────────────────────
    // 화면 크기 변경 시 바운딩 박스 재조정
    // ──────────────────────────────────────
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            if (currentBbox && selectedIndex !== null && selectedIndex >= 0) {
                createBboxOverlay(currentBbox);
            }
        }, 250);
    });

    // ──────────────────────────────────────
    // 업로드 핸들러
    // ──────────────────────────────────────
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragging');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragging');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragging');
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    function handleFile(file) {
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            showToast('이미지 파일만 업로드 가능합니다', 'error');
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            showToast('파일 크기가 10MB를 초과합니다', 'error');
            return;
        }

        selectedFile = file;
        resetState();

        // 미리보기
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImage.src = e.target.result;
            previewImage.onload = () => {
                // 차량 감지 시작
                detectVehicles();
            };
        };
        reader.readAsDataURL(file);

        fileName.textContent = file.name;
        emptyState.classList.add('d-none');
        imageCard.classList.remove('d-none');
        updateStatus('detecting', '감지 중');
    }

    function resetState() {
        detections = [];
        selectedIndex = null;
        currentBbox = null;
        detectionList.innerHTML = '';
        bboxOverlayContainer.innerHTML = '';
        resultSection.classList.add('d-none');
        identifyBtn.disabled = true;
    }

    // ──────────────────────────────────────
    // 차량 감지
    // ──────────────────────────────────────
    async function detectVehicles() {
        loadingSpinner.classList.remove('d-none');
        loadingText.textContent = '차량을 감지하고 있습니다...';

        try {
            const formData = new FormData();
            formData.append('file', selectedFile);

            const response = await fetch('/detect', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${response.status}`);
            }

            const result = await response.json();
            handleDetectionResult(result);

        } catch (e) {
            showToast(`감지 실패: ${e.message}`, 'error');
            updateStatus('error', '감지 실패');
        } finally {
            loadingSpinner.classList.add('d-none');
        }
    }

    function handleDetectionResult(result) {
        detections = result.detections || [];
        imageWidth = result.image_width;
        imageHeight = result.image_height;

        if (detections.length === 0) {
            detectionList.innerHTML = '<p style="color: #999; font-size: 13px;">차량이 감지되지 않았습니다. 이미지 전체로 판별합니다.</p>';
            updateStatus('detected', '감지 완료');
            selectedIndex = -1;
            currentBbox = null;
            identifyBtn.disabled = false;
        } else {
            // 감지 목록 표시
            displayDetectionList();
            updateStatus('detected', `${detections.length}대 감지`);

            // 첫 번째 자동 선택
            selectDetection(0);
        }
    }

    function displayDetectionList() {
        detectionList.innerHTML = detections.map((det, idx) => `
            <div class="list-group-item list-group-item-action" id="det-item-${idx}" onclick="selectDetection(${idx})">
                <strong>${det.class_name}</strong> (신뢰도: ${(det.confidence * 100).toFixed(1)}%)
                <br>
                <small>면적: ${det.area.toLocaleString()} px²</small>
            </div>
        `).join('');
    }

    function selectDetection(index) {
        selectedIndex = index;
        const detection = detections[index];
        currentBbox = [...detection.bbox];

        // 목록 하이라이트 업데이트
        document.querySelectorAll('.list-group-item').forEach((item, idx) => {
            item.classList.toggle('active', idx === index);
        });

        // 바운딩 박스 오버레이 생성
        createBboxOverlay(currentBbox);

        identifyBtn.disabled = false;
    }

    function createBboxOverlay(bbox) {
        bboxOverlayContainer.innerHTML = '';

        const displayedW = previewImage.clientWidth;
        const displayedH = previewImage.clientHeight;

        // 이미지의 실제 표시 위치 계산 (센터링 고려)
        const containerRect = imageContainer.getBoundingClientRect();
        const imgRect = previewImage.getBoundingClientRect();
        const offsetX = imgRect.left - containerRect.left;
        const offsetY = imgRect.top - containerRect.top;

        const scaleX = displayedW / imageWidth;
        const scaleY = displayedH / imageHeight;

        const [x1, y1, x2, y2] = bbox;
        const left = x1 * scaleX + offsetX;
        const top = y1 * scaleY + offsetY;
        const width = (x2 - x1) * scaleX;
        const height = (y2 - y1) * scaleY;

        const overlay = document.createElement('div');
        overlay.className = 'bbox-overlay';
        overlay.id = 'activeBbox';
        overlay.style.left = `${left}px`;
        overlay.style.top = `${top}px`;
        overlay.style.width = `${width}px`;
        overlay.style.height = `${height}px`;

        overlay.innerHTML = `
            <div class="bbox-label">드래그하여 조정 가능</div>
            <div class="bbox-handle nw"></div>
            <div class="bbox-handle ne"></div>
            <div class="bbox-handle sw"></div>
            <div class="bbox-handle se"></div>
        `;

        bboxOverlayContainer.appendChild(overlay);
        makeBboxDraggable();
    }

    function makeBboxDraggable() {
        const bboxElement = document.getElementById('activeBbox');
        if (!bboxElement) return;

        const imgRect = previewImage.getBoundingClientRect();
        const containerRect = imageContainer.getBoundingClientRect();
        const offsetX = imgRect.left - containerRect.left;
        const offsetY = imgRect.top - containerRect.top;

        let isDragging = false;
        let startX, startY, startLeft, startTop;

        // 박스 이동
        bboxElement.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('bbox-handle')) return;

            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = bboxElement.offsetLeft;
            startTop = bboxElement.offsetTop;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            let newLeft = startLeft + dx;
            let newTop = startTop + dy;

            // 이미지 영역 내로 제한
            const minLeft = offsetX;
            const minTop = offsetY;
            const maxLeft = offsetX + previewImage.clientWidth - bboxElement.offsetWidth;
            const maxTop = offsetY + previewImage.clientHeight - bboxElement.offsetHeight;

            newLeft = Math.max(minLeft, Math.min(maxLeft, newLeft));
            newTop = Math.max(minTop, Math.min(maxTop, newTop));

            bboxElement.style.left = `${newLeft}px`;
            bboxElement.style.top = `${newTop}px`;
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                updateBboxFromOverlay();
            }
        });

        // 리사이즈 핸들
        const handles = bboxElement.querySelectorAll('.bbox-handle');
        handles.forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                const handleType = handle.classList[1];
                handleResize(handleType, e);
            });
        });
    }

    function handleResize(handleType, startEvent) {
        const bboxElement = document.getElementById('activeBbox');
        if (!bboxElement) return;

        const imgRect = previewImage.getBoundingClientRect();
        const containerRect = imageContainer.getBoundingClientRect();
        const offsetX = imgRect.left - containerRect.left;
        const offsetY = imgRect.top - containerRect.top;
        const imgMaxX = offsetX + previewImage.clientWidth;
        const imgMaxY = offsetY + previewImage.clientHeight;

        const startX = startEvent.clientX;
        const startY = startEvent.clientY;
        const startLeft = bboxElement.offsetLeft;
        const startTop = bboxElement.offsetTop;
        const startWidth = bboxElement.offsetWidth;
        const startHeight = bboxElement.offsetHeight;

        const minSize = 50;

        const onMouseMove = (e) => {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            if (handleType === 'se') {
                const newWidth = Math.max(minSize, Math.min(imgMaxX - startLeft, startWidth + dx));
                const newHeight = Math.max(minSize, Math.min(imgMaxY - startTop, startHeight + dy));
                bboxElement.style.width = `${newWidth}px`;
                bboxElement.style.height = `${newHeight}px`;
            } else if (handleType === 'nw') {
                const newWidth = startWidth - dx;
                const newHeight = startHeight - dy;
                const newLeft = startLeft + dx;
                const newTop = startTop + dy;

                if (newWidth >= minSize && newHeight >= minSize && newLeft >= offsetX && newTop >= offsetY) {
                    bboxElement.style.left = `${newLeft}px`;
                    bboxElement.style.top = `${newTop}px`;
                    bboxElement.style.width = `${newWidth}px`;
                    bboxElement.style.height = `${newHeight}px`;
                }
            } else if (handleType === 'ne') {
                const newHeight = startHeight - dy;
                const newTop = startTop + dy;
                const newWidth = Math.max(minSize, Math.min(imgMaxX - startLeft, startWidth + dx));

                if (newHeight >= minSize && newTop >= offsetY) {
                    bboxElement.style.top = `${newTop}px`;
                    bboxElement.style.width = `${newWidth}px`;
                    bboxElement.style.height = `${newHeight}px`;
                }
            } else if (handleType === 'sw') {
                const newWidth = startWidth - dx;
                const newLeft = startLeft + dx;
                const newHeight = Math.max(minSize, Math.min(imgMaxY - startTop, startHeight + dy));

                if (newWidth >= minSize && newLeft >= offsetX) {
                    bboxElement.style.left = `${newLeft}px`;
                    bboxElement.style.width = `${newWidth}px`;
                    bboxElement.style.height = `${newHeight}px`;
                }
            }
        };

        const onMouseUp = () => {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            updateBboxFromOverlay();
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        startEvent.preventDefault();
    }

    function updateBboxFromOverlay() {
        const bboxElement = document.getElementById('activeBbox');
        if (!bboxElement) return;

        const imgRect = previewImage.getBoundingClientRect();
        const containerRect = imageContainer.getBoundingClientRect();
        const offsetX = imgRect.left - containerRect.left;
        const offsetY = imgRect.top - containerRect.top;

        const scaleX = imageWidth / previewImage.clientWidth;
        const scaleY = imageHeight / previewImage.clientHeight;

        const x1 = Math.round((bboxElement.offsetLeft - offsetX) * scaleX);
        const y1 = Math.round((bboxElement.offsetTop - offsetY) * scaleY);
        const x2 = Math.round((bboxElement.offsetLeft + bboxElement.offsetWidth - offsetX) * scaleX);
        const y2 = Math.round((bboxElement.offsetTop + bboxElement.offsetHeight - offsetY) * scaleY);

        currentBbox = [x1, y1, x2, y2];
    }

    // ──────────────────────────────────────
    // 판별
    // ──────────────────────────────────────
    identifyBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        identifyBtn.disabled = true;
        loadingSpinner.classList.remove('d-none');
        loadingText.textContent = '차량을 판별하고 있습니다...';
        updateStatus('identifying', '판별 중');
        resultSection.classList.add('d-none');

        try {
            const formData = new FormData();
            formData.append('file', selectedFile);

            if (currentBbox) {
                formData.append('bbox', currentBbox.join(','));
            }

            const response = await fetch('/identify', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${response.status}`);
            }

            const result = await response.json();
            displayResult(result);

        } catch (e) {
            showToast(`판별 실패: ${e.message}`, 'error');
            updateStatus('error', '판별 실패');
            identifyBtn.disabled = false;
        } finally {
            loadingSpinner.classList.add('d-none');
        }
    });

    function displayResult(result) {
        updateStatus('completed', '분석 완료');

        resultManufacturer.textContent = result.manufacturer_korean || '-';
        resultModel.textContent = result.model_korean || '-';
        resultConfidence.textContent = result.confidence ? `${(result.confidence * 100).toFixed(1)}%` : '-';

        resultSection.classList.remove('d-none');
        identifyBtn.textContent = '재분석';
        identifyBtn.disabled = false;
    }

    // ──────────────────────────────────────
    // 삭제
    // ──────────────────────────────────────
    deleteBtn.addEventListener('click', () => {
        selectedFile = null;
        fileInput.value = '';
        previewImage.src = '';
        imageCard.classList.add('d-none');
        emptyState.classList.remove('d-none');
        resetState();
    });

    // ──────────────────────────────────────
    // 유틸리티
    // ──────────────────────────────────────
    function updateStatus(type, text) {
        const typeMap = { ready: 'info', detecting: 'warning', detected: 'info', identifying: 'primary', completed: 'success', error: 'danger' };
        statusBadge.className = `badge rounded-pill bg-${typeMap[type] || 'secondary'}`;
        statusBadge.textContent = text;
    }

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'reeve-toast';
        toast.textContent = message;

        if (type === 'error') toast.style.background = '#ef4444';
        else if (type === 'success') toast.style.background = '#10b981';

        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
</script>

</body>
</html>
