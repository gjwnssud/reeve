<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Admin/Management icon with database and gear -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>

  <!-- Database cylinder -->
  <ellipse cx="50" cy="35" rx="20" ry="6" fill="#fff" opacity="0.9"/>
  <rect x="30" y="35" width="40" height="20" fill="#fff" opacity="0.9"/>
  <ellipse cx="50" cy="55" rx="20" ry="6" fill="#fff" opacity="0.9"/>

  <!-- Gear/Settings icon -->
  <circle cx="65" cy="70" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="65" cy="70" r="4" fill="url(#grad1)"/>
  <rect x="63" y="62" width="4" height="4" fill="#fff" opacity="0.9"/>
  <rect x="63" y="74" width="4" height="4" fill="#fff" opacity="0.9"/>
  <rect x="57" y="68" width="4" height="4" fill="#fff" opacity="0.9"/>
  <rect x="69" y="68" width="4" height="4" fill="#fff" opacity="0.9"/>
</svg>
