<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reeve - 차량데이터 관리</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/reeve-theme.css" rel="stylesheet">
</head>
<body>
    <button class="btn btn-primary position-fixed d-lg-none" style="top:.75rem;left:.75rem;z-index:1046;"
            type="button" data-bs-toggle="offcanvas" data-bs-target="#reeveSidebar">
        <i class="bi bi-list"></i>
    </button>
    <aside class="offcanvas offcanvas-start d-flex flex-column" id="reeveSidebar" tabindex="-1"
           data-bs-theme="dark" style="width:220px;background:linear-gradient(180deg,#667eea 0%,#764ba2 100%);">
        <div class="offcanvas-header border-bottom border-white border-opacity-25 d-lg-none">
            <span class="offcanvas-title fw-bold"><i class="bi bi-car-front"></i> Reeve</span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="py-4 text-center border-bottom border-white border-opacity-25 d-none d-lg-flex align-items-center justify-content-center">
            <a href="/" class="text-white text-decoration-none fs-5 fw-bold"><i class="bi bi-car-front"></i> Reeve</a>
        </div>
        <nav class="flex-grow-1 p-2 overflow-y-auto">
            <a href="/analyze-ui" class="nav-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1 text-white text-opacity-75"><i class="bi bi-camera"></i> 이미지 분석</a>
            <a href="/admin-ui" class="nav-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1 text-white fw-semibold bg-white bg-opacity-25"><i class="bi bi-database"></i> 차량데이터 관리</a>
            <a href="/basic-data-ui" class="nav-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1 text-white text-opacity-75"><i class="bi bi-list-check"></i> 기초데이터 관리</a>
            <a href="/finetune-ui" class="nav-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1 text-white text-opacity-75"><i class="bi bi-gear"></i> 파인튜닝</a>
        </nav>
        <div class="p-3 border-top border-white border-opacity-25">
            <button class="btn btn-outline-light btn-sm w-100" id="themeToggle"><i class="bi bi-moon-stars"></i> 테마</button>
        </div>
    </aside>

    <div class="reeve-main">
    <div class="container-xxl py-4">

        <!-- 상태 필터 탭 -->
        <ul class="nav nav-tabs mb-0 flex-wrap" id="vehicleStatusTabs">
            <li class="nav-item">
                <button class="nav-link active" type="button" data-status="all">
                    전체 <span class="badge bg-secondary ms-1" id="badgeAll">-</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" type="button" data-status="uploaded">
                    업로드 <span class="badge ms-1" id="badgeUploaded" style="background:#6b7280;color:#fff;">-</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" type="button" data-status="yolo_detected">
                    탐지완료 <span class="badge ms-1" id="badgeYoloDetected" style="background:#8b5cf6;color:#fff;">-</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" type="button" data-status="analysis_complete">
                    분석완료 <span class="badge bg-warning text-dark ms-1" id="badgeAnalysisComplete">-</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" type="button" data-status="verified">
                    검증완료 <span class="badge bg-success ms-1" id="badgeVerified">-</span>
                </button>
            </li>
        </ul>

        <div class="card border-top-0 rounded-top-0">
        <div class="card-body">

            <!-- 필터 + 배치 액션 바 -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <select id="mfFilterVehicle" class="form-select form-select-sm" style="width:auto;">
                        <option value="">전체 제조사</option>
                    </select>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteSelectedVehicles()">
                        <i class="bi bi-trash"></i> 선택 삭제
                    </button>
                    <button class="btn btn-outline-success btn-sm" onclick="saveSelectedToVectorDB()">
                        <i class="bi bi-floppy"></i> 선택 검수 승인
                    </button>
                </div>
            </div>

            <!-- 테이블 -->
            <div class="table-responsive">
                <table class="table table-hover table-sm align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width:36px;"><input type="checkbox" id="vehicleSelectAll" class="form-check-input"></th>
                            <th style="width:70px;">썸네일</th>
                            <th style="width:90px;">상태</th>
                            <th>제조사</th>
                            <th>모델명</th>
                            <th style="width:140px;">분석일시</th>
                            <th style="width:200px;">액션</th>
                        </tr>
                    </thead>
                    <tbody id="vehicleTableBody">
                        <tr><td colspan="7" class="text-center py-4 text-muted">데이터를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이지네이션 -->
            <nav id="vehiclePagination" class="mt-3"></nav>

        </div>
        </div>

    </div><!-- /.container-xxl -->
    </div><!-- /.reeve-main -->

    <!-- 분석결과 편집 모달 -->
    <div class="modal fade" id="vehicleEditModal" tabindex="-1">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="vehicleEditTitle">차량데이터 편집</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <!-- 좌측: 이미지 + BBox 드로잉 -->
                    <div class="col-lg-7">
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <small class="text-muted"><i class="bi bi-bounding-box"></i> 기존 박스 드래그(이동/코너 조절) 또는 빈 영역 드래그(새 박스)</small>
                            <button class="btn btn-outline-secondary btn-sm py-0" onclick="resetVehicleBbox()">초기화</button>
                        </div>
                        <div style="position:relative;background:#111;border-radius:8px;overflow:hidden;">
                            <canvas id="vehicleEditCanvas" style="display:block;width:100%;cursor:crosshair;touch-action:none;"></canvas>
                        </div>
                        <div id="vehicleBboxInfo" class="mt-1 small text-muted"></div>
                        <div id="vehicleReanalyzeStatus" class="mt-2 p-2 rounded small" style="display:none;"></div>
                    </div>
                    <!-- 우측: 편집 폼 + 액션 버튼 -->
                    <div class="col-lg-5">
                        <input type="hidden" id="vehicleEditId">
                        <div id="vehicleEditCurrentAnalysis" class="mb-3 p-2 bg-body-secondary rounded small text-muted"></div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">제조사 *</label>
                            <select id="vehicleEditManufacturer" class="form-select">
                                <option value="">제조사 선택</option>
                            </select>
                            <div class="mt-1">
                                <button type="button" class="btn btn-secondary btn-sm" onclick="openVehicleInlineAddManufacturer()">+ 새 제조사</button>
                            </div>
                            <div id="vehicleInlineAddManufacturer" style="display:none;" class="mt-2 p-2 bg-info-subtle border border-info rounded">
                                <input type="text" id="vehicleInlineMfCode" class="form-control form-control-sm mb-2" placeholder="코드 (예: hyundai)">
                                <input type="text" id="vehicleInlineMfKorean" class="form-control form-control-sm mb-2" placeholder="한글명 (예: 현대자동차)">
                                <input type="text" id="vehicleInlineMfEnglish" class="form-control form-control-sm mb-2" placeholder="영문명 (예: Hyundai)">
                                <div class="form-check mb-2">
                                    <input type="checkbox" class="form-check-input" id="vehicleInlineMfDomestic">
                                    <label class="form-check-label small" for="vehicleInlineMfDomestic">국내</label>
                                </div>
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-primary btn-sm" onclick="saveVehicleInlineManufacturer()">추가</button>
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeVehicleInlineAddManufacturer()">취소</button>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">모델 *</label>
                            <select id="vehicleEditModel" class="form-select">
                                <option value="">제조사를 먼저 선택하세요</option>
                            </select>
                            <div class="mt-1">
                                <button type="button" class="btn btn-secondary btn-sm" onclick="openVehicleInlineAddModel()">+ 새 모델</button>
                            </div>
                            <div id="vehicleInlineAddModel" style="display:none;" class="mt-2 p-2 bg-success-subtle border border-success rounded">
                                <input type="text" id="vehicleInlineModelCode" class="form-control form-control-sm mb-2" placeholder="코드 (예: sonata)">
                                <input type="text" id="vehicleInlineModelKorean" class="form-control form-control-sm mb-2" placeholder="한글명 (예: 소나타)">
                                <input type="text" id="vehicleInlineModelEnglish" class="form-control form-control-sm mb-2" placeholder="영문명 (예: Sonata)">
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-primary btn-sm" onclick="saveVehicleInlineModel()">추가</button>
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeVehicleInlineAddModel()">취소</button>
                                </div>
                            </div>
                        </div>

                        <hr class="my-3">
                        <div class="d-grid gap-2">
                            <button id="vehicleQuickReanalyzeBtn" type="button" class="btn btn-primary" onclick="quickReanalyzeVehicle()">
                                <i class="bi bi-arrow-repeat"></i> 재분석 (기존 이미지 그대로)
                            </button>
                            <button id="vehicleReanalyzeBtn" type="button" class="btn btn-outline-primary" onclick="reanalyzeVehicleFromModal()">
                                <i class="bi bi-bounding-box"></i> 재분석 (선택 영역 기준)
                            </button>
                            <button id="vehicleSaveVectorBtn" type="button" class="btn btn-success" onclick="saveVehicleFromModal()">
                                <i class="bi bi-floppy"></i> 저장완료 (벡터DB 등록)
                            </button>
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">닫기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>

    <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/theme-toggle.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
