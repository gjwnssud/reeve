<!-- 다중 이미지 바운딩 박스 조절 영역 -->
<div id="multi-image-container" style="display: none; margin-top: 20px;">
    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <h4>📦 다중 이미지 차량 영역 조절</h4>
        <p style="color: #666; margin: 10px 0 0 0; font-size: 0.9em;">
            💡 각 이미지별로 차량 영역을 조절할 수 있습니다. 자동 감지된 박스를 드래그하거나 새로 그려보세요.
        </p>
    </div>
    
    <!-- 다중 이미지 로딩 표시 -->
    <div id="multi-detection-loading" style="display: none; text-align: center; padding: 40px;">
        <div class="spinner"></div>
        <p>이미지들에서 차량을 감지하고 있습니다...</p>
        <div id="detection-progress" style="margin-top: 10px; font-size: 0.9em; color: #666;"></div>
    </div>
    
    <!-- 페이징 컨트롤 (상단) -->
    <div id="multi-pagination-top" style="display: none;"></div>
    
    <!-- 이미지 그리드 -->
    <div id="multi-image-grid" class="multi-image-grid"></div>
    
    <!-- 페이징 컨트롤 (하단) -->
    <div id="multi-pagination-bottom" style="display: none;"></div>
    
    <!-- 분석 버튼들 -->
    <div id="multi-analysis-controls" class="analysis-controls" style="display: none;">
        <div class="btn-group">
            <button class="btn" onclick="analyzeAllSelectedRegions()">
                🎯 모든 선택 영역 분석
            </button>
            <button class="btn btn-secondary" onclick="analyzeAllFullImages()">
                📋 모든 전체 이미지 분석
            </button>
        </div>
        <div class="utility-buttons">
            <button onclick="selectAllImages()">✅ 모두 선택</button>
            <button onclick="deselectAllImages()">❌ 모두 해제</button>
            <button onclick="resetAllBoundingBoxes()">🔄 모든 박스 리셋</button>
        </div>
    </div>
</div>
