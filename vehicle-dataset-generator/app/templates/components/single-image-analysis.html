<!-- 단일 이미지 바운딩 박스 조절 영역 -->
<div id="single-image-container" style="display: none; margin-top: 20px;">
    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <h4>📦 차량 영역 조절</h4>
        <p style="color: #666; margin: 10px 0 0 0; font-size: 0.9em;">
            💡 자동 감지된 박스를 드래그하여 조절하거나, 새로운 영역을 그려보세요. 조절 후 "분석하기" 버튼을 클릭하세요.
        </p>
    </div>
    
    <div id="canvas-container" class="canvas-container">
        <canvas id="image-canvas"></canvas>
        <div class="canvas-controls">
            <button onclick="resetBoundingBox()" class="btn-small">🔄 리셋</button>
            <button onclick="toggleAutoDetect()" id="auto-detect-btn" class="btn-small">🔍 자동감지</button>
        </div>
    </div>
    
    <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn" onclick="analyzeSelectedRegion()" id="analyze-region-btn" style="flex: 1; min-width: 200px;">
            🎯 선택 영역 분석하기
        </button>
        <button class="btn btn-secondary" onclick="analyzeFullImage()" style="flex: 1; min-width: 200px;">
            📋 전체 이미지 분석
        </button>
    </div>
</div>
